services:
  db:
    image: postgres:16-alpine
    container_name: tip2-pr6-db
    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tasks -d tasksdb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    container_name: tip2-pr6-auth
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      AUTH_PORT: "8081"
      AUTH_GRPC_PORT: "50051"

  tasks:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: tip2-pr6-tasks
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
    environment:
      TASKS_PORT: "8082"
      AUTH_GRPC_ADDR: auth:50051
      TASKS_DB_DSN: postgres://tasks:tasks@db:5432/tasksdb?sslmode=disable

  nginx:
    image: nginx:1.27-alpine
    container_name: tip2-pr6-nginx
    depends_on:
      - tasks
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro

volumes:
  postgres_data: